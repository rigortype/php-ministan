<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" width="700" height="540" role="img" aria-label="型の絞り込み" style="font-family:&#39;Inter&#39;,system-ui,&#39;Hiragino Kaku Gothic ProN&#39;,&#39;Yu Gothic&#39;,&#39;Noto Sans JP&#39;,sans-serif;fill:#0E1116">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="540" style="fill:#F6F4EE"></rect>

  
  <text x="244" y="88" text-anchor="end" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:15px;fill:#0E1116">$x :</text>
  <rect x="288" y="62" width="72" height="42" rx="5" style="fill:#E1ECF8;stroke:#2D5C9E;stroke-width:1.5"></rect>
  <text x="324" y="88" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:14.5px;fill:#2D5C9E;font-weight:600">int</text>
  <rect x="360" y="62" width="72" height="42" rx="5" style="fill:#EFEBE0;stroke:#585F6B;stroke-width:1.5"></rect>
  <text x="396" y="88" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:14.5px;fill:#2A2F38;font-weight:600">null</text>
  <text x="448" y="87" style="font-size:11.5px;fill:#585F6B">union ＝ 2 つのマス</text>

  <line x1="360" y1="104" x2="360" y2="138" marker-end="url(#arr)" style="fill:none;stroke:#585F6B;stroke-width:1.6"></line>

  
  <rect x="263" y="138" width="194" height="46" rx="6" style="fill:#FFFFFF;stroke:#C9C4B7;stroke-width:1.5"></rect>
  <text x="360" y="167" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:15px;fill:#0E1116">if ($x === null)</text>
  <text x="470" y="155" style="font-size:11.5px;fill:#585F6B">TypeSpecifier が条件を</text>
  <text x="470" y="170" style="font-size:11.5px;fill:#585F6B">truthy / falsy に分割</text>

  
  <path d="M300,184 Q190,206 175,230" marker-end="url(#arr)" style="fill:none;stroke:#585F6B;stroke-width:1.6"></path>
  <path d="M420,184 Q530,206 545,230" marker-end="url(#arr)" style="fill:none;stroke:#585F6B;stroke-width:1.6"></path>
  <text x="232" y="200" style="font-size:12px;font-weight:600;fill:#585F6B">真</text>
  <text x="486" y="200" style="font-size:12px;font-weight:600;fill:#2E6F3F">偽</text>

  
  <text x="78" y="214" style="font-size:12px;font-weight:600;fill:#585F6B">truthy（=== null が真）</text>
  <rect x="74" y="232" width="200" height="46" rx="6" style="fill:#FFFFFF;stroke:#585F6B;stroke-width:1.5"></rect>
  <text x="174" y="261" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:15px;fill:#0E1116">$x : <tspan style="font-weight:700">null</tspan></text>

  <line x1="174" y1="278" x2="174" y2="300" marker-end="url(#arr)" style="fill:none;stroke:#585F6B;stroke-width:1.6"></line>
  <rect x="104" y="300" width="140" height="42" rx="6" style="fill:#F1E2DE;stroke:#7A2A2A;stroke-width:1.5"></rect>
  <text x="174" y="327" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:15px;fill:#7A2A2A;font-weight:600">return 0;</text>

  
  <line x1="174" y1="342" x2="174" y2="388" style="stroke:#585F6B;stroke-width:1.6;stroke-dasharray:4 4"></line>
  <g style="stroke:#B5302B;stroke-width:2.2">
    <line x1="166" y1="382" x2="182" y2="398"></line>
    <line x1="182" y1="382" x2="166" y2="398"></line>
  </g>
  <text x="160" y="396" text-anchor="end" style="font-size:12px;font-weight:600;fill:#B5302B">合流しない</text>
  <text x="160" y="411" text-anchor="end" style="font-size:11.5px;fill:#585F6B">return で終わる枝</text>

  
  <text x="426" y="214" style="font-size:12px;font-weight:600;fill:#2E6F3F">falsy（=== null が偽）</text>
  <rect x="446" y="232" width="200" height="46" rx="6" style="fill:#E1ECF8;stroke:#2D5C9E;stroke-width:1.6"></rect>
  <text x="546" y="261" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:15px;fill:#2D5C9E">$x : <tspan style="font-weight:700">int</tspan></text>
  <text x="546" y="296" text-anchor="middle" style="font-size:11.5px;fill:#585F6B">null を引いて int に絞り込み</text>
  <text x="546" y="311" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:10.5px;fill:#585F6B">TypeCombinator::remove</text>

  <path d="M546,311 Q546,360 446,398" marker-end="url(#arr)" style="fill:none;stroke:#585F6B;stroke-width:1.6"></path>

  
  <text x="360" y="392" text-anchor="middle" style="font-size:11.5px;fill:#585F6B">if の後に残るのは falsy 側だけ</text>
  <rect x="263" y="398" width="194" height="48" rx="6" style="fill:#E1EEDD;stroke:#2E6F3F;stroke-width:1.8"></rect>
  <text x="360" y="428" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:16px;fill:#2E6F3F">$x : <tspan style="font-weight:700">int</tspan></text>

  
  <rect x="40" y="466" width="620" height="40" rx="6" style="fill:#EFEBE0;stroke:#C9C4B7;stroke-width:1.2"></rect>
  <text x="56" y="491" style="font-size:12.5px;fill:#2A2F38">else があれば両枝とも <tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:12px">mergeWith</tspan> の union で合流して戻る —— <tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:12px;font-weight:600;fill:#7A2A2A">int | null</tspan></text>

  <text x="40" y="528" style="font-family:&#39;Source Serif 4&#39;,Georgia,serif;font-style:italic;font-size:13.5px;fill:#585F6B">条件が分岐ごとに型を狭める。終わる枝は合流に寄与せず、残る枝が <tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:12px;font-style:normal">if</tspan> の後を決める。</text>
</svg>