<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" role="img" aria-label="レベルの正体" style="font-family:&#39;Inter&#39;,system-ui,&#39;Hiragino Kaku Gothic ProN&#39;,&#39;Yu Gothic&#39;,&#39;Noto Sans JP&#39;,sans-serif;fill:#F4F0E2">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="500" style="fill:#1A1D23"></rect>

  
  <rect x="40" y="40" width="296" height="88" rx="7" style="fill:#22262E;stroke:#454A54;stroke-width:1.5"></rect>
  <text x="60" y="78" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:17px;fill:#F4F0E2">int.accepts(mixed)</text>
  <text x="60" y="108" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:17px;fill:#E4B25A;font-weight:700">= Maybe<tspan style="font-family:&#39;Inter&#39;,sans-serif;font-size:12px;font-weight:400;fill:#B6BAC2">　（たぶん int）</tspan></text>

  
  <circle cx="372" cy="58" r="6" style="fill:#1F2F25;stroke:#86C28E;stroke-width:1.5"></circle>
  <text x="388" y="63" style="font-size:12.5px;fill:#E6E1D2"><tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-weight:600;fill:#86C28E">Yes</tspan>　→　常に OK</text>
  <circle cx="372" cy="86" r="6" style="fill:#3A2422;stroke:#ED8B82;stroke-width:1.5"></circle>
  <text x="388" y="91" style="font-size:12.5px;fill:#E6E1D2"><tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-weight:600;fill:#ED8B82">No</tspan>　→　常にエラー</text>
  <circle cx="372" cy="114" r="6" style="fill:#3A2E1C;stroke:#E4B25A;stroke-width:1.5"></circle>
  <text x="388" y="119" style="font-size:12.5px;fill:#E6E1D2;font-weight:600"><tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;fill:#E4B25A">Maybe</tspan>　→　レベルが決める</text>

  
  <path d="M150,128 L150,176 Q150,196 240,205 L498,205" marker-end="url(#arr)" style="fill:none;stroke:#E4B25A;stroke-width:1.8"></path>
  <text x="300" y="198" style="font-size:11px;fill:#E4B25A">Maybe の運命はレベルで決まる</text>

  
  <rect x="70" y="222" width="436" height="58" rx="4" style="fill:#1F2F25"></rect>
  <rect x="506" y="222" width="124" height="58" rx="4" style="fill:#3A2422"></rect>
  <text x="288" y="248" text-anchor="middle" style="font-size:13px;font-weight:600;fill:#86C28E">素通り（OK）</text>
  <text x="288" y="268" text-anchor="middle" style="font-size:11px;fill:#86C28E">低レベル —— Maybe を見逃す</text>
  <text x="568" y="248" text-anchor="middle" style="font-size:13px;font-weight:600;fill:#ED8B82">咎める</text>
  <text x="568" y="268" text-anchor="middle" style="font-size:11px;fill:#ED8B82">高レベル —— エラー</text>

  
  <line x1="70" y1="280" x2="638" y2="280" marker-end="url(#arr)" style="fill:none;stroke:#E6E1D2;stroke-width:2"></line>
  <text x="640" y="284" style="font-size:12px;fill:#B6BAC2">level</text>
  <g style="stroke:#B6BAC2;stroke-width:1.2">
    <line x1="70" y1="276" x2="70" y2="288"></line>
    <line x1="132" y1="276" x2="132" y2="288"></line>
    <line x1="195" y1="276" x2="195" y2="288"></line>
    <line x1="257" y1="276" x2="257" y2="288"></line>
    <line x1="319" y1="276" x2="319" y2="288"></line>
    <line x1="381" y1="276" x2="381" y2="288"></line>
    <line x1="443" y1="276" x2="443" y2="288"></line>
    <line x1="568" y1="276" x2="568" y2="288"></line>
  </g>
  <g style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:11.5px;fill:#B6BAC2" text-anchor="middle">
    <text x="70" y="302">0</text>
    <text x="132" y="302">1</text>
    <text x="195" y="302">2</text>
    <text x="257" y="302">3</text>
    <text x="319" y="302">4</text>
    <text x="381" y="302">5</text>
    <text x="443" y="302">6</text>
    <text x="568" y="302">8</text>
  </g>

  
  <line x1="506" y1="210" x2="506" y2="312" style="stroke:#E08C84;stroke-width:2.2;stroke-dasharray:5 3"></line>
  <circle cx="506" cy="280" r="5.5" style="fill:#1A1D23;stroke:#E08C84;stroke-width:2.2"></circle>
  <text x="506" y="302" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:12px;font-weight:700;fill:#E08C84">7</text>
  <text x="506" y="328" text-anchor="middle" style="font-size:12px;font-weight:600;fill:#E08C84">閾値（スイッチ）</text>
  <text x="506" y="343" text-anchor="middle" style="font-size:11px;fill:#B6BAC2">※ ministan の簡略化した一例</text>

  
  <text x="40" y="378" style="font-size:12.5px;font-weight:600;fill:#F4F0E2">レベルでルールが増える</text>
  <g style="font-size:12px;fill:#E6E1D2">
    <text x="40" y="400"><tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-weight:600;fill:#F4F0E2">0</tspan> —— var_dump・未定義メソッド</text>
    <text x="40" y="420"><tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-weight:600;fill:#F4F0E2">1</tspan> —— 未定義変数</text>
    <text x="40" y="440"><tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-weight:600;fill:#F4F0E2">5</tspan> —— 引数の型</text>
    <text x="40" y="460"><tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-weight:600;fill:#F4F0E2">6</tspan> —— 戻り値の型</text>
  </g>

  
  <rect x="378" y="362" width="284" height="106" rx="7" style="fill:#2A2E37;stroke:#454A54;stroke-width:1.3"></rect>
  <text x="396" y="386" style="font-size:12.5px;font-weight:600;fill:#F4F0E2">厳しさは二段構え</text>
  <text x="396" y="410" style="font-size:12px;fill:#E6E1D2"><tspan style="font-weight:700">(1)</tspan> ルールが増える</text>
  <text x="396" y="436" style="font-size:12px;fill:#E6E1D2"><tspan style="font-weight:700">(2)</tspan> <tspan style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:11px">RuleLevelHelper</tspan> が</text>
  <text x="420" y="454" style="font-size:12px;fill:#E6E1D2">mixed にも厳しくなる</text>

  <text x="40" y="490" style="font-family:&#39;Source Serif 4&#39;,Georgia,serif;font-style:italic;font-size:13.5px;fill:#B6BAC2">三値の Maybe を、レベルの閾値を境に「素通りか咎めるか」で裁く。</text>
</svg>