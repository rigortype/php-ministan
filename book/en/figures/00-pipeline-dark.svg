<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" role="img" aria-label="ministan's analysis pipeline" style="font-family:&#39;Inter&#39;,system-ui,sans-serif;fill:#F4F0E2">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="440" style="fill:#1A1D23"></rect>

  <text x="24" y="48" style="font-size:11.5px;font-weight:600;fill:#B6BAC2;letter-spacing:.04em">Parse / scope resolution</text>


  <rect x="24" y="70" width="120" height="60" rx="6" style="fill:#22262E;stroke:#454A54;stroke-width:1.5"></rect>
  <text x="84" y="98" text-anchor="middle" style="font-size:16px;font-weight:500;fill:#F4F0E2">Source code</text>
  <text x="84" y="118" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:12px;fill:#B6BAC2">*.php</text>

  <line x1="148" y1="100" x2="192" y2="100" marker-end="url(#arr)" style="fill:none;stroke:#B6BAC2;stroke-width:1.6"></line>
  <text x="170" y="148" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:11.5px;fill:#B6BAC2">nikic/php-parser</text>

  <rect x="196" y="70" width="92" height="60" rx="6" style="fill:#22262E;stroke:#454A54;stroke-width:1.5"></rect>
  <text x="242" y="106" text-anchor="middle" style="font-size:16px;font-weight:500;fill:#F4F0E2">AST</text>

  <line x1="292" y1="100" x2="336" y2="100" marker-end="url(#arr)" style="fill:none;stroke:#B6BAC2;stroke-width:1.6"></line>

  <rect x="340" y="70" width="184" height="60" rx="6" style="fill:#22262E;stroke:#454A54;stroke-width:1.5"></rect>
  <text x="432" y="97" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,Consolas,monospace;font-size:14px;font-weight:500;fill:#F4F0E2">NodeScopeResolver</text>
  <text x="432" y="117" text-anchor="middle" style="font-size:12px;fill:#B6BAC2">walk the tree, carry Scope</text>

  <line x1="528" y1="100" x2="568" y2="100" marker-end="url(#arr)" style="fill:none;stroke:#B6BAC2;stroke-width:1.6"></line>

  <rect x="572" y="70" width="124" height="60" rx="6" style="fill:#1F2C3F;stroke:#8AB6E6;stroke-width:1.5"></rect>
  <text x="634" y="97" text-anchor="middle" style="font-size:16px;font-weight:600;fill:#8AB6E6">Scope</text>
  <text x="634" y="117" text-anchor="middle" style="font-size:12px;fill:#8AB6E6">variable &#8594; type</text>


  <path d="M634,130 L634,196 Q634,206 624,206 L89,206 Q79,206 79,216 L79,264" marker-end="url(#arr)" style="fill:none;stroke:#B6BAC2;stroke-width:1.6"></path>


  <rect x="24" y="268" width="110" height="60" rx="6" style="fill:#22262E;stroke:#454A54;stroke-width:1.5"></rect>
  <text x="79" y="295" text-anchor="middle" style="font-size:16px;font-weight:500;fill:#F4F0E2">Rules</text>
  <text x="79" y="315" text-anchor="middle" style="font-size:12px;fill:#B6BAC2">find mismatches</text>

  <line x1="138" y1="298" x2="206" y2="298" marker-end="url(#arr)" style="fill:none;stroke:#B6BAC2;stroke-width:1.6"></line>

  <rect x="210" y="268" width="110" height="60" rx="6" style="fill:#3A2422;stroke:#ED8B82;stroke-width:1.5"></rect>
  <text x="265" y="295" text-anchor="middle" style="font-size:16px;font-weight:500;fill:#ED8B82">Errors</text>
  <text x="265" y="315" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:12px;fill:#ED8B82">path:line</text>

  <line x1="324" y1="298" x2="392" y2="298" marker-end="url(#arr)" style="fill:none;stroke:#B6BAC2;stroke-width:1.6"></line>

  <rect x="396" y="268" width="150" height="60" rx="6" style="fill:#22262E;stroke:#454A54;stroke-width:1.5"></rect>
  <text x="471" y="295" text-anchor="middle" style="font-size:16px;font-weight:500;fill:#F4F0E2">Format &amp; output</text>
  <text x="471" y="315" text-anchor="middle" style="font-family:&#39;JetBrains Mono&#39;,ui-monospace,Menlo,monospace;font-size:12px;fill:#B6BAC2">[ERROR] Found &#8230;</text>

  <text x="24" y="392" style="font-family:&#39;Source Serif 4&#39;,Georgia,serif;font-style:italic;font-size:13.5px;fill:#B6BAC2">ministan's skeleton — walk the AST without running it, infer types at each point, report against the rules.</text>
  <text x="24" y="414" style="font-size:11.5px;fill:#B6BAC2">Later chapters add features to this &#8220;middle.&#8221;</text>
</svg>