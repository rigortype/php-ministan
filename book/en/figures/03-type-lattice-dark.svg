<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" width="700" height="560" role="img" aria-label="The type lattice" style="font-family:'Inter',system-ui,sans-serif;fill:#F4F0E2">
  <defs>
    <marker id="up" viewBox="0 0 10 10" refX="5" refY="1.5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,8 L5,0 L10,8 z" fill="context-stroke"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="560" style="fill:#1A1D23"></rect>


  <g style="fill:none;stroke:#454A54;stroke-width:1.5">
    <line x1="350" y1="94" x2="100" y2="180"></line>
    <line x1="350" y1="94" x2="225" y2="180"></line>
    <line x1="350" y1="94" x2="350" y2="180"></line>
    <line x1="350" y1="94" x2="475" y2="180"></line>
    <line x1="350" y1="94" x2="600" y2="180"></line>
    <line x1="225" y1="220" x2="225" y2="312"></line>
    <line x1="350" y1="220" x2="350" y2="312"></line>
    <line x1="350" y1="440" x2="100" y2="348"></line>
    <line x1="350" y1="440" x2="225" y2="348"></line>
    <line x1="350" y1="440" x2="350" y2="348"></line>
    <line x1="350" y1="440" x2="475" y2="220"></line>
    <line x1="350" y1="440" x2="600" y2="220"></line>
  </g>


  <line x1="100" y1="312" x2="100" y2="222" marker-end="url(#up)" style="stroke:#86C28E;stroke-width:2.4"></line>


  <rect x="275" y="50" width="150" height="44" rx="6" style="fill:#2A2E37;stroke:#E6E1D2;stroke-width:1.6"></rect>
  <text x="350" y="78" text-anchor="middle" style="font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;font-size:15px;font-weight:600;fill:#F4F0E2">mixed</text>
  <text x="350" y="38" text-anchor="middle" style="font-size:11.5px;fill:#B6BAC2">Top — every value</text>


  <g style="font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;font-size:15px;font-weight:600;fill:#8AB6E6">
    <rect x="58" y="180" width="84" height="40" rx="6" style="fill:#1F2C3F;stroke:#8AB6E6;stroke-width:1.5"></rect>
    <text x="100" y="206" text-anchor="middle">int</text>
    <rect x="183" y="180" width="84" height="40" rx="6" style="fill:#1F2C3F;stroke:#8AB6E6;stroke-width:1.5"></rect>
    <text x="225" y="206" text-anchor="middle">string</text>
    <rect x="308" y="180" width="84" height="40" rx="6" style="fill:#1F2C3F;stroke:#8AB6E6;stroke-width:1.5"></rect>
    <text x="350" y="206" text-anchor="middle">bool</text>
    <rect x="433" y="180" width="84" height="40" rx="6" style="fill:#1F2C3F;stroke:#8AB6E6;stroke-width:1.5"></rect>
    <text x="475" y="206" text-anchor="middle">float</text>
    <rect x="558" y="180" width="84" height="40" rx="6" style="fill:#1F2C3F;stroke:#8AB6E6;stroke-width:1.5"></rect>
    <text x="600" y="206" text-anchor="middle">null</text>
  </g>
  <text x="650" y="206" style="font-size:10.5px;fill:#8AB6E6">Atomic</text>


  <g style="font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;font-size:14px;font-weight:600;fill:#E08C84">
    <rect x="64" y="312" width="72" height="36" rx="6" style="fill:#3A2622;stroke:#E08C84;stroke-width:1.5"></rect>
    <text x="100" y="336" text-anchor="middle">42</text>
    <rect x="189" y="312" width="72" height="36" rx="6" style="fill:#3A2622;stroke:#E08C84;stroke-width:1.5"></rect>
    <text x="225" y="336" text-anchor="middle">&#39;foo&#39;</text>
    <rect x="314" y="312" width="72" height="36" rx="6" style="fill:#3A2622;stroke:#E08C84;stroke-width:1.5"></rect>
    <text x="350" y="336" text-anchor="middle">true</text>
  </g>
  <text x="424" y="334" style="font-size:10.5px;fill:#E08C84">Constant types</text>


  <rect x="275" y="440" width="150" height="44" rx="6" style="fill:#2A2E37;stroke:#E6E1D2;stroke-width:1.6"></rect>
  <text x="350" y="468" text-anchor="middle" style="font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;font-size:15px;font-weight:600;fill:#F4F0E2">never</text>
  <text x="350" y="504" text-anchor="middle" style="font-size:11.5px;fill:#B6BAC2">Bottom — empty set (never happens)</text>


  <path d="M120,432 Q92,400 100,352" style="fill:none;stroke:#86C28E;stroke-width:1.5;stroke-dasharray:3 3"></path>
  <rect x="30" y="430" width="180" height="92" rx="7" style="fill:#22262E;stroke:#454A54;stroke-width:1.4"></rect>
  <text x="44" y="452" style="font-size:12px;font-weight:600;fill:#F4F0E2">Containment is asymmetric</text>
  <text x="44" y="476" style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12.5px;fill:#86C28E;font-weight:600">int ⊇ 42 = Yes</text>
  <text x="44" y="492" style="font-size:10.5px;fill:#B6BAC2">42 is always an int</text>
  <text x="44" y="510" style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12.5px;fill:#E4B25A;font-weight:600">42 ⊇ int = Maybe</text>


  <rect x="498" y="34" width="13" height="13" rx="2" style="fill:#1F2F25;stroke:#86C28E"></rect>
  <text x="517" y="45" style="font-size:12px;fill:#E6E1D2">Yes — definitely contains</text>
  <rect x="498" y="56" width="13" height="13" rx="2" style="fill:#3A2E1C;stroke:#E4B25A"></rect>
  <text x="517" y="67" style="font-size:12px;fill:#E6E1D2">Maybe — may contain</text>
  <rect x="498" y="78" width="13" height="13" rx="2" style="fill:#3A2422;stroke:#ED8B82"></rect>
  <text x="517" y="89" style="font-size:12px;fill:#E6E1D2">No — does not contain</text>

  <text x="36" y="546" style="font-family:'Source Serif 4',Georgia,serif;font-style:italic;font-size:13.5px;fill:#B6BAC2">Types are sets of values — from <tspan style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12px;font-style:normal">mixed</tspan> down to <tspan style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12px;font-style:normal">never</tspan>, containment forms a lattice.</text>
</svg>